name: Deploy Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1-5'    # 07:00 Amsterdam (UTC+2)
    - cron: '30 11 * * 1-5'  # 13:30 Amsterdam (UTC+2)
    - cron: '0 14 * * 1-5'   # 16:00 Amsterdam (UTC+2)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch Aircall data
        run: npm run fetch
        env:
          AIRCALL_API_ID: ${{ secrets.AIRCALL_API_ID }}
          AIRCALL_API_TOKEN: ${{ secrets.AIRCALL_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
